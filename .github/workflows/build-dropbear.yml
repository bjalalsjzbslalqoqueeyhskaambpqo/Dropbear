name: Build Dropbear Binaries

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Dropbear
      uses: actions/checkout@v4
      with:
        repository: 'mkj/dropbear'
        ref: 'DROPBEAR_2026.91'
        fetch-depth: 1

    - name: Setup NDK
      uses: nttld/setup-ndk@v1
      id: setup-ndk
      with:
        ndk-version: r27c

    - name: Instalar Dependencias
      run: sudo apt-get update && sudo apt-get install -y musl-tools build-essential

    - name: Inyectar localoptions.h
      run: |
        cat << 'EOF' > localoptions.h
        #define DO_HOST_LOOKUP 0
        #define DROPBEAR_3DES 0
        #define DROPBEAR_ENABLE_CBC_MODE 0
        #define DROPBEAR_SHA1_96_MAC 0
        #define DROPBEAR_SHA2_512_MAC 0
        #define DROPBEAR_TWOFISH128 0
        #define DROPBEAR_TWOFISH256 0
        EOF

    - name: Compilar para Linux x86_64
      run: |
        mkdir -p final_output
        CC=musl-gcc ./configure --prefix=/opt/btserver --disable-zlib --enable-static
        make clean
        make LDFLAGS=-static MULTI=1 PROGRAMS="dropbear dbclient dropbearkey" -j$(nproc)
        strip dropbearmulti
        cp dropbearmulti final_output/dropbearmulti-debian-x64
        make distclean

    - name: Compilar para Android ARM64
      env:
        NDK_PATH: ${{ steps.setup-ndk.outputs.ndk-path }}
      run: |
        mkdir -p final_output/arm64-v8a
        export TOOLCHAIN=$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64
        export AR=$TOOLCHAIN/bin/llvm-ar
        export RANLIB=$TOOLCHAIN/bin/llvm-ranlib
        export STRIP=$TOOLCHAIN/bin/llvm-strip
        export CC=$TOOLCHAIN/bin/aarch64-linux-android21-clang
        ./configure --host=aarch64-linux-android --disable-zlib --disable-syslog
        make clean
        make MULTI=1 PROGRAMS="dropbear dbclient dropbearkey" -j$(nproc)
        $STRIP dropbearmulti
        cp dropbearmulti final_output/arm64-v8a/libdropbear.so
        make distclean

    - name: Compilar para Android ARM32
      env:
        NDK_PATH: ${{ steps.setup-ndk.outputs.ndk-path }}
      run: |
        mkdir -p final_output/armeabi-v7a
        export TOOLCHAIN=$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64
        export AR=$TOOLCHAIN/bin/llvm-ar
        export RANLIB=$TOOLCHAIN/bin/llvm-ranlib
        export STRIP=$TOOLCHAIN/bin/llvm-strip
        export CC=$TOOLCHAIN/bin/armv7a-linux-androideabi21-clang
        ./configure --host=arm-linux-androideabi --disable-zlib --disable-syslog
        make clean
        make MULTI=1 PROGRAMS="dropbear dbclient dropbearkey" -j$(nproc)
        $STRIP dropbearmulti
        cp dropbearmulti final_output/armeabi-v7a/libdropbear.so
        make distclean

    - name: Verificar Binarios
      run: |
        echo "=== LINUX x86_64 ==="
        file final_output/dropbearmulti-debian-x64
        ldd final_output/dropbearmulti-debian-x64 2>/dev/null || echo "(estático - sin dependencias)"
        echo ""
        echo "=== ANDROID ARM64 ==="
        file final_output/arm64-v8a/libdropbear.so
        echo ""
        echo "=== ANDROID ARM32 ==="
        file final_output/armeabi-v7a/libdropbear.so

    - name: Subir a Rama de GitHub
      run: |
        git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git repo_binarios
        cd repo_binarios
        git switch binarios-dropbear || git checkout -b binarios-dropbear
        mkdir -p arm64-v8a armeabi-v7a
        cp ../final_output/dropbearmulti-debian-x64 dropbearmulti-debian-x64
        cp ../final_output/arm64-v8a/libdropbear.so arm64-v8a/libdropbear.so
        cp ../final_output/armeabi-v7a/libdropbear.so armeabi-v7a/libdropbear.so
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git add dropbearmulti-debian-x64 arm64-v8a/libdropbear.so armeabi-v7a/libdropbear.so
        git commit -m "Actualizar Binarios Dropbear (Linux x86_64 + Android) [skip ci]" || echo "Sin cambios"
        git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
        git push origin binarios-dropbear -f
