name: Compilación Inteligente Dropbear (Android y Debian 11)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # Botón para ejecutar manualmente desde la web

jobs:
  # TRABAJO 1: COMPILACIÓN PARA ANDROID (CROSS-COMPILATION)
  build-android:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: "armeabi-v7a"
            target: "armv7a-linux-androideabi"
            api: "21"
          - arch: "arm64-v8a"
            target: "aarch64-linux-android"
            api: "21"
    steps:
    - name: Descargar Código Oficial de Dropbear
      uses: actions/checkout@v4
      with:
        repository: 'mkj/dropbear'
        ref: 'master'
        fetch-depth: 1

    - name: Configurar Android NDK
      uses: nttld/setup-ndk@v1
      id: setup-ndk
      with:
        ndk-version: r27c

    - name: Inyectar Configuración Ultra-Ligera (localoptions.h)
      run: |
        cat << 'EOF' > localoptions.h
        #define DROPBEAR_SMALL_CODE 1
        #define DROPBEAR_BLOWFISH 0
        #define DROPBEAR_TWOFISH128 0
        #define DROPBEAR_TWOFISH256 0
        #define DROPBEAR_3DES 0
        #define DROPBEAR_AES256 0
        #define DROPBEAR_X11FWD 0
        #define DROPBEAR_SFTPSERVER 0
        #define DROPBEAR_AES128 1
        #define DROPBEAR_CHACHA20POLY1305 1
        #define DROPBEAR_CURVE25519 1
        #define DROPBEAR_CLI_LOCALPORTFWD 1
        #define DROPBEAR_SVR_LOCALPORTFWD 1
        EOF

    - name: Ejecutar Compilación Cruzada Android
      env:
        NDK_PATH: ${{ steps.setup-ndk.outputs.ndk-path }}
      run: |
        export TOOLCHAIN=$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64
        export CC=$TOOLCHAIN/bin/${{ matrix.target }}${{ matrix.api }}-clang
        export LD=$TOOLCHAIN/bin/llvm-ld
        export STRIP=$TOOLCHAIN/bin/llvm-strip
        export CFLAGS="-Os -fdata-sections -ffunction-sections -fPIE"
        export LDFLAGS="-Wl,--gc-sections -pie"
        
        ./configure --host=${{ matrix.target }} --disable-zlib --disable-syslog --disable-utmp --disable-utmpx --disable-wtmp --disable-wtmpx --disable-loginfunc --disable-harden
        make PROGRAMS="dropbear dbclient dropbearkey"
        $STRIP dropbearmulti
        mkdir -p output
        cp dropbearmulti output/dropbearmulti

    - name: Subir Binario Android
      uses: actions/upload-artifact@v4
      with:
        name: dropbear-android-${{ matrix.arch }}
        path: output/dropbearmulti

  # TRABAJO 2: COMPILACIÓN EN CONTENEDOR DE DEBIAN 11 PARA TU SERVIDOR
  build-debian11:
    runs-on: ubuntu-latest
    # Corremos el proceso dentro de un contenedor oficial de Debian 11 puro para asegurar compatibilidad
    container:
      image: debian:11-slim
    steps:
    - name: Instalar herramientas de compilación en Debian 11
      run: |
        apt-get update
        apt-get install -y git build-essential gcc make wget
        
    - name: Descargar Código Oficial de Dropbear
      uses: actions/checkout@v4
      with:
        repository: 'mkj/dropbear'
        ref: 'master'
        fetch-depth: 1

    - name: Inyectar Configuración Ultra-Ligera (localoptions.h)
      run: |
        cat << 'EOF' > localoptions.h
        #define DROPBEAR_SMALL_CODE 1
        #define DROPBEAR_BLOWFISH 0
        #define DROPBEAR_TWOFISH128 0
        #define DROPBEAR_TWOFISH256 0
        #define DROPBEAR_3DES 0
        #define DROPBEAR_AES256 0
        #define DROPBEAR_X11FWD 0
        #define DROPBEAR_SFTPSERVER 0
        #define DROPBEAR_AES128 1
        #define DROPBEAR_CHACHA20POLY1305 1
        #define DROPBEAR_CURVE25519 1
        #define DROPBEAR_CLI_LOCALPORTFWD 1
        #define DROPBEAR_SVR_LOCALPORTFWD 1
        EOF

    - name: Compilar nativamente para Debian 11
      run: |
        # Banderas de optimización nativas de Debian para CPU pequeña
        export CFLAGS="-Os -fdata-sections -ffunction-sections"
        export LDFLAGS="-Wl,--gc-sections"
        
        ./configure --disable-zlib --disable-syslog --disable-utmp --disable-utmpx --disable-wtmp --disable-wtmpx --disable-loginfunc --disable-harden
        make PROGRAMS="dropbear dbclient dropbearkey"
        strip dropbearmulti
        mkdir -p output
        cp dropbearmulti output/dropbearmulti-debian11

    - name: Subir Binario Debian 11
      uses: actions/upload-artifact@v4
      with:
        name: dropbear-servidor-debian11
        path: output/dropbearmulti-debian11
