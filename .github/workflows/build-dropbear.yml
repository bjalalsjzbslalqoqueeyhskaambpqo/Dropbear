name: Build Dropbear Android

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Dropbear
      uses: actions/checkout@v4
      with:
        repository: 'mkj/dropbear'
        ref: 'DROPBEAR_2024.86'
        fetch-depth: 1

    - name: Setup NDK
      uses: nttld/setup-ndk@v1
      id: setup-ndk
      with:
        ndk-version: r27c

    - name: Inspeccionar antes de parchear
      run: |
        echo "=== known_hosts en cli-runopts.c ==="
        grep -n "known_hosts\|known_host\|\.ssh" src/cli-runopts.c | head -20
        echo "=== /proc en dbrandom.c ==="
        grep -n "process_file.*proc" src/dbrandom.c
        echo "=== HOME usage en cli-runopts.c ==="
        grep -n "HOME\|getenv\|getpwuid\|passwd" src/cli-runopts.c | head -20

    - name: Aplicar parches para Android
      run: |
        # ---------- getpass (sin terminal) ----------
        cat << 'GETPASS_EOF' > src/netbsd_getpass.c
        #include <stdio.h>
        #include <stdlib.h>
        #include <string.h>
        #include <unistd.h>

        char *getpass(const char *prompt) {
            static char buf[1024];
            const char *env = getenv("DROPBEAR_PASSWORD");
            if (env) {
                strncpy(buf, env, sizeof(buf) - 1);
                buf[sizeof(buf) - 1] = '\0';
                return buf;
            }
            buf[0] = '\0';
            return buf;
        }
        GETPASS_EOF

        echo 'char *getpass(const char *prompt);' >> src/includes.h
        sed -i 's/cli-agentfwd\.o/cli-agentfwd.o netbsd_getpass.o/' Makefile.in
        grep "netbsd_getpass" Makefile.in || { echo "ERROR: Makefile no parchado"; exit 1; }

        # ---------- /proc/* → /dev/null (TODOS los que quedaron) ----------
        sed -i 's|process_file(&hs, "/proc/interrupts"|process_file(\&hs, "/dev/null"|g' src/dbrandom.c
        sed -i 's|process_file(&hs, "/proc/loadavg"|process_file(\&hs, "/dev/null"|g' src/dbrandom.c
        sed -i 's|process_file(&hs, "/proc/sys/kernel/random/entropy_avail"|process_file(\&hs, "/dev/null"|g' src/dbrandom.c
        sed -i 's|process_file(&hs, "/proc/net/netstat"|process_file(\&hs, "/dev/null"|g' src/dbrandom.c
        sed -i 's|process_file(&hs, "/proc/net/dev"|process_file(\&hs, "/dev/null"|g' src/dbrandom.c
        sed -i 's|process_file(&hs, "/proc/net/tcp"|process_file(\&hs, "/dev/null"|g' src/dbrandom.c
        sed -i 's|process_file(&hs, "/proc/net/rt_cache"|process_file(\&hs, "/dev/null"|g' src/dbrandom.c
        sed -i 's|process_file(&hs, "/proc/vmstat"|process_file(\&hs, "/dev/null"|g' src/dbrandom.c

        # ---------- Patch known_hosts: redirigir a /dev/null ----------
        # Primero ver el string exacto que usa (puede ser "known_hosts" hardcoded o via HOME)
        # Forzamos que cualquier path construido con .ssh/known_hosts apunte a /dev/null
        sed -i 's|".ssh/known_hosts"|"/dev/null"|g' src/cli-runopts.c || true
        sed -i 's|"/.ssh/known_hosts"|"/dev/null"|g' src/cli-runopts.c || true
        sed -i 's|known_hosts|known_hosts_disabled|g' src/cli-runopts.c || true

        # ---------- Patch identity file por defecto ----------
        sed -i 's|".ssh/id_dropbear"|"/dev/null"|g' src/cli-runopts.c || true
        sed -i 's|"/.ssh/id_dropbear"|"/dev/null"|g' src/cli-runopts.c || true

        # ---------- localoptions.h ----------
        cat << 'EOF' > localoptions.h
        #define DROPBEAR_CLI_PASSWORD_AUTH 1
        #define DROPBEAR_CLI_PUBKEY_AUTH 1
        #define DROPBEAR_SVR_PASSWORD_AUTH 0
        #define DISABLE_SYSLOG 1
        #define DO_HOST_LOOKUP 0
        #define DROPBEAR_SMALL_CODE 1
        #define DROPBEAR_3DES 0
        #define DROPBEAR_ENABLE_CBC_MODE 0
        #define DROPBEAR_SHA1_96_MAC 0
        #define DROPBEAR_SHA2_512_MAC 0
        #define DROPBEAR_TWOFISH128 0
        #define DROPBEAR_TWOFISH256 0
        #define DROPBEAR_BLOWFISH 0
        #define DROPBEAR_USE_PRNGD 0
        EOF

    - name: Verificar parches
      run: |
        echo "=== /proc restantes en dbrandom.c (debería estar vacío) ==="
        grep -n "process_file.*proc" src/dbrandom.c || echo "OK: sin /proc"
        echo "=== known_hosts en cli-runopts.c ==="
        grep -n "known_hosts\|id_dropbear" src/cli-runopts.c | head -10
        echo "=== Makefile ==="
        grep "netbsd_getpass" Makefile.in

    - name: Compilar ARM64
      env:
        NDK_PATH: ${{ steps.setup-ndk.outputs.ndk-path }}
      run: |
        mkdir -p output/arm64-v8a
        TOOLCHAIN=$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64
        export CC=$TOOLCHAIN/bin/aarch64-linux-android21-clang
        export AR=$TOOLCHAIN/bin/llvm-ar
        export RANLIB=$TOOLCHAIN/bin/llvm-ranlib
        export STRIP=$TOOLCHAIN/bin/llvm-strip
        ./configure \
          --host=aarch64-linux-android \
          --disable-zlib \
          --disable-syslog \
          --disable-utmp \
          --disable-wtmp \
          --disable-lastlog
        make clean
        make MULTI=1 PROGRAMS="dbclient dropbearkey dropbearconvert" -j$(nproc)
        $STRIP dropbearmulti
        cp dropbearmulti output/arm64-v8a/libdropbear.so
        echo "=== Strings problemáticos ARM64 ==="
        strings output/arm64-v8a/libdropbear.so | grep -E "^/proc|/data/tests|known_hosts|id_dropbear" || echo "OK"
        make distclean

    - name: Compilar ARM32
      env:
        NDK_PATH: ${{ steps.setup-ndk.outputs.ndk-path }}
      run: |
        mkdir -p output/armeabi-v7a
        TOOLCHAIN=$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64
        export CC=$TOOLCHAIN/bin/armv7a-linux-androideabi21-clang
        export AR=$TOOLCHAIN/bin/llvm-ar
        export RANLIB=$TOOLCHAIN/bin/llvm-ranlib
        export STRIP=$TOOLCHAIN/bin/llvm-strip
        ./configure \
          --host=arm-linux-androideabi \
          --disable-zlib \
          --disable-syslog \
          --disable-utmp \
          --disable-wtmp \
          --disable-lastlog
        make clean
        make MULTI=1 PROGRAMS="dbclient dropbearkey dropbearconvert" -j$(nproc)
        $STRIP dropbearmulti
        cp dropbearmulti output/armeabi-v7a/libdropbear.so
        echo "=== Strings problemáticos ARM32 ==="
        strings output/armeabi-v7a/libdropbear.so | grep -E "^/proc|/data/tests|known_hosts|id_dropbear" || echo "OK"
        make distclean

    - name: Verificar binarios finales
      run: |
        echo "=== ARM64 ===" && file output/arm64-v8a/libdropbear.so && ls -lh output/arm64-v8a/libdropbear.so
        echo "=== ARM32 ===" && file output/armeabi-v7a/libdropbear.so && ls -lh output/armeabi-v7a/libdropbear.so

    - name: Push binarios
      run: |
        git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git repo
        cd repo
        git switch binarios-dropbear 2>/dev/null || git checkout -b binarios-dropbear
        mkdir -p arm64-v8a armeabi-v7a
        cp ../output/arm64-v8a/libdropbear.so arm64-v8a/libdropbear.so
        cp ../output/armeabi-v7a/libdropbear.so armeabi-v7a/libdropbear.so
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git add arm64-v8a/libdropbear.so armeabi-v7a/libdropbear.so
        git commit -m "dropbear android $(date -u +%Y-%m-%d)" || echo "sin cambios"
        git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
        git push origin binarios-dropbear -f
