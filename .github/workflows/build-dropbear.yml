name: Build Dropbear Android

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Dropbear
      uses: actions/checkout@v4
      with:
        repository: 'mkj/dropbear'
        ref: 'DROPBEAR_2024.86'
        fetch-depth: 1

    - name: Setup NDK
      uses: nttld/setup-ndk@v1
      id: setup-ndk
      with:
        ndk-version: r27c

    - name: Crear localoptions.h
      run: |
        cat << 'EOF' > localoptions.h
        /* Siguiendo ribbons/android-dropbear */

        /* Sin password auth: getpass() no funciona en Android */
        #define DROPBEAR_CLI_PASSWORD_AUTH 0
        #define DROPBEAR_SVR_PASSWORD_AUTH 0

        /* Solo pubkey */
        #define DROPBEAR_CLI_PUBKEY_AUTH 1

        /* Android no tiene syslog */
        #define DISABLE_SYSLOG 1

        /* Sin resolución de hostnames inversa */
        #define DO_HOST_LOOKUP 0

        /* Binario más pequeño */
        #define DROPBEAR_SMALL_CODE 1

        /* Cifrados innecesarios desactivados */
        #define DROPBEAR_3DES 0
        #define DROPBEAR_ENABLE_CBC_MODE 0
        #define DROPBEAR_SHA1_96_MAC 0
        #define DROPBEAR_SHA2_512_MAC 0
        #define DROPBEAR_TWOFISH128 0
        #define DROPBEAR_TWOFISH256 0
        #define DROPBEAR_BLOWFISH 0
        EOF

    - name: Compilar ARM64
      env:
        NDK_PATH: ${{ steps.setup-ndk.outputs.ndk-path }}
      run: |
        mkdir -p output/arm64-v8a
        TOOLCHAIN=$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64
        export CC=$TOOLCHAIN/bin/aarch64-linux-android21-clang
        export AR=$TOOLCHAIN/bin/llvm-ar
        export RANLIB=$TOOLCHAIN/bin/llvm-ranlib
        export STRIP=$TOOLCHAIN/bin/llvm-strip
        ./configure \
          --host=aarch64-linux-android \
          --disable-zlib \
          --disable-syslog \
          --disable-utmp \
          --disable-wtmp \
          --disable-lastlog
        make clean
        make MULTI=1 PROGRAMS="dbclient dropbearkey dropbearconvert" -j$(nproc)
        $STRIP dropbearmulti
        cp dropbearmulti output/arm64-v8a/libdropbear.so
        echo "=== Verificar strings problemáticos ARM64 ==="
        strings output/arm64-v8a/libdropbear.so | grep -E "getpass|/data/tests|getpwuid" || echo "OK: limpio"
        make distclean

    - name: Compilar ARM32
      env:
        NDK_PATH: ${{ steps.setup-ndk.outputs.ndk-path }}
      run: |
        mkdir -p output/armeabi-v7a
        TOOLCHAIN=$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64
        export CC=$TOOLCHAIN/bin/armv7a-linux-androideabi21-clang
        export AR=$TOOLCHAIN/bin/llvm-ar
        export RANLIB=$TOOLCHAIN/bin/llvm-ranlib
        export STRIP=$TOOLCHAIN/bin/llvm-strip
        ./configure \
          --host=arm-linux-androideabi \
          --disable-zlib \
          --disable-syslog \
          --disable-utmp \
          --disable-wtmp \
          --disable-lastlog
        make clean
        make MULTI=1 PROGRAMS="dbclient dropbearkey dropbearconvert" -j$(nproc)
        $STRIP dropbearmulti
        cp dropbearmulti output/armeabi-v7a/libdropbear.so
        echo "=== Verificar strings problemáticos ARM32 ==="
        strings output/armeabi-v7a/libdropbear.so | grep -E "getpass|/data/tests|getpwuid" || echo "OK: limpio"
        make distclean

    - name: Verificar binarios finales
      run: |
        echo "=== ARM64 ===" && file output/arm64-v8a/libdropbear.so && ls -lh output/arm64-v8a/libdropbear.so
        echo "=== ARM32 ===" && file output/armeabi-v7a/libdropbear.so && ls -lh output/armeabi-v7a/libdropbear.so

    - name: Push binarios
      run: |
        git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git repo
        cd repo
        git switch binarios-dropbear 2>/dev/null || git checkout -b binarios-dropbear
        mkdir -p arm64-v8a armeabi-v7a
        cp ../output/arm64-v8a/libdropbear.so arm64-v8a/libdropbear.so
        cp ../output/armeabi-v7a/libdropbear.so armeabi-v7a/libdropbear.so
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git add arm64-v8a/libdropbear.so armeabi-v7a/libdropbear.so
        git commit -m "dropbear android $(date -u +%Y-%m-%d)" || echo "sin cambios"
        git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
        git push origin binarios-dropbear -f
