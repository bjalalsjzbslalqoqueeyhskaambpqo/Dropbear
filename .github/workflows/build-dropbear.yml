name: Build Dropbear Binaries

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Dropbear
      uses: actions/checkout@v4
      with:
        repository: 'mkj/dropbear'
        ref: 'DROPBEAR_2026.91'
        fetch-depth: 1

    - name: Setup NDK
      uses: nttld/setup-ndk@v1
      id: setup-ndk
      with:
        ndk-version: r27c

    - name: Instalar Musl (Para Debian)
      run: sudo apt-get update && sudo apt-get install -y musl-tools

    - name: Inyectar localoptions.h
      run: |
        cat << 'EOF' > localoptions.h
        #define DROPBEAR_SVR_PASSWORD_AUTH 0
        #define DROPBEAR_CLI_PASSWORD_AUTH 0
        #define DISABLE_SYSLOG 1
        #define DO_HOST_LOOKUP 0
        #define DROPBEAR_3DES 0
        #define DROPBEAR_ENABLE_CBC_MODE 0
        #define DROPBEAR_SHA1_96_MAC 0
        #define DROPBEAR_SHA2_512_MAC 0
        #define DROPBEAR_TWOFISH128 0
        #define DROPBEAR_TWOFISH256 0
        EOF

    - name: Compilar Todo
      env:
        NDK_PATH: ${{ steps.setup-ndk.outputs.ndk-path }}
      run: |
        mkdir -p final_output
        
        # 1. Compilar ARM64 (Android)
        export TOOLCHAIN=$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64
        export CC=$TOOLCHAIN/bin/aarch64-linux-android21-clang
        export AR=$TOOLCHAIN/bin/llvm-ar
        export RANLIB=$TOOLCHAIN/bin/llvm-ranlib
        export STRIP=$TOOLCHAIN/bin/llvm-strip
        ./configure --host=aarch64-linux-android --disable-zlib --disable-syslog
        make clean && make MULTI=1 PROGRAMS="dropbear dbclient dropbearkey" -j$(nproc)
        $STRIP dropbearmulti
        cp dropbearmulti final_output/dropbearmulti-arm64

        # 2. Compilar ARM32 (Android Viejo)
        export CC=$TOOLCHAIN/bin/armv7a-linux-androideabi21-clang
        ./configure --host=arm-linux-androideabi --disable-zlib --disable-syslog
        make clean && make MULTI=1 PROGRAMS="dropbear dbclient dropbearkey" -j$(nproc)
        $STRIP dropbearmulti
        cp dropbearmulti final_output/dropbearmulti-arm32

        # 3. Compilar x64 (Servidor Debian Estático)
        CC=musl-gcc LDFLAGS="-static" ./configure --disable-zlib --disable-syslog
        make clean && make MULTI=1 PROGRAMS="dropbear dbclient dropbearkey" -j$(nproc)
        strip dropbearmulti
        cp dropbearmulti final_output/dropbearmulti-debian-x64

    - name: Subir a Rama de GitHub
      run: |
        # Clonamos nuestro propio repositorio para guardar los binarios
        git clone https://${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git repo_binarios
        cd repo_binarios
        
        # Cambiamos o creamos la rama 'binarios-dropbear'
        git switch binarios-dropbear || git checkout -b binarios-dropbear
        
        # Copiamos los archivos y hacemos push
        cp ../final_output/* ./
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git add dropbearmulti-*
        git commit -m "Actualizar Binarios Dropbear [skip ci]" || echo "Sin cambios"
        git push origin binarios-dropbear -f
